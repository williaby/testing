# OpenSSF Scorecard for Claude Code Configuration
# Delegates to the org-level reusable Scorecard workflow.
#
# Dashboard: https://securityscorecards.dev/viewer/?uri=github.com/ByronWilliamsCPA/.claude
# Documentation: https://github.com/ossf/scorecard
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Tuesdays at 21:21 UTC
    - cron: '21 21 * * 2'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    name: Scorecard Analysis
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    uses: ByronWilliamsCPA/.github/.github/workflows/python-scorecard.yml@f05c26a424a708a73fc445a0ebb5b3ce476c1793  # main
    with:
      publish-results: true
